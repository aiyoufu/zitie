<!DOCTYPE html>
<html lang="zh-CN" data-theme-pref="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <title>字帖</title>
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('zhitie-theme') || 'auto';
        var dark = saved === 'dark' || (saved === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme-pref', saved);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=43" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
</head>
<body>
  <!-- 移动端顶部工具栏（极简 Header） -->
  <header id="mobile-header">
    <div class="mobile-brand">
      <svg class="brand-logo-icon" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="字帖图标">
        <rect x="2" y="2" width="28" height="28" rx="7.5" class="brand-icon-bg" />
        <!-- 白底田字格纸张卡片与十字虚线 -->
        <rect x="5.5" y="5.5" width="21" height="21" rx="2.5" class="brand-tian-bg" />
        <rect x="5.5" y="5.5" width="21" height="21" rx="2.5" class="brand-tian-border" stroke-width="1.2" fill="none"/>
        <line x1="5.5" y1="16" x2="26.5" y2="16" class="brand-grid-line" stroke-dasharray="2.5 2" stroke-width="1"/>
        <line x1="16" y1="5.5" x2="16" y2="26.5" class="brand-grid-line" stroke-dasharray="2.5 2" stroke-width="1"/>
        <!-- 经典红铅笔（整体向右上平移，笔尖位于 11.5, 20.5） -->
        <path d="M 17.5 10.5 L 25.5 2.5 C 26.3 1.7 27.7 1.7 28.5 2.5 C 29.3 3.3 29.3 4.7 28.5 5.5 L 21.5 14.5 Z" fill="#ef4444" class="brand-pencil-body"/>
        <path d="M 17.5 10.5 L 25.5 2.5 L 27 4 L 19.5 12.5 Z" fill="#f87171" class="brand-pencil-highlight"/>
        <path d="M 13.5 16.5 L 17.5 10.5 C 18.5 12.5 20.5 13.5 21.5 14.5 L 15.5 18.5 Z" fill="#fed7aa" class="brand-pencil-wood"/>
        <path d="M 11.5 20.5 L 13.5 16.5 L 15.5 18.5 Z" fill="#1f2937" class="brand-pencil-lead"/>
        <circle cx="10.5" cy="21.5" r="1" fill="#374151" class="brand-ink-dot"/>
      </svg>
      <h1>字帖</h1>
    </div>
  </header>

  <!-- 移动端底部悬浮 Dock 菜单栏 -->
  <div id="mobile-floating-dock" class="mobile-floating-dock" aria-label="快捷操作菜单">
    <div class="dock-container">
      <div class="mobile-theme-dropdown" id="mobileThemeDropdown">
        <button id="mobileThemeBtn" type="button" class="dock-item" title="切换主题" aria-label="切换主题" aria-haspopup="true" aria-expanded="false">
          <span id="mobileThemeIcon" class="dock-icon-wrapper"></span>
          <span class="dock-item-label">主题</span>
        </button>
        <div class="mobile-theme-menu" id="mobileThemeMenu" role="menu" hidden>
          <button type="button" class="theme-menu-item" data-theme-set="light" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
            <span>浅色</span>
          </button>
          <button type="button" class="theme-menu-item" data-theme-set="dark" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/>
            </svg>
            <span>深色</span>
          </button>
          <button type="button" class="theme-menu-item" data-theme-set="auto" role="menuitem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="13" rx="2"/>
              <path d="M8 21h8M12 17v4"/>
            </svg>
            <span>跟随系统</span>
          </button>
        </div>
      </div>

      <button id="mobilePrintBtn" type="button" class="dock-item" title="打印字帖" aria-label="打印字帖">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
        <span class="dock-item-label">打印</span>
      </button>

      <button id="toggleDrawerBtn" type="button" class="dock-item" title="配置参数" aria-label="配置参数">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span class="dock-item-label">设置</span>
      </button>
    </div>
  </div>

  <!-- 抽屉蒙层 -->
  <div id="drawer-backdrop" class="drawer-backdrop" aria-hidden="true"></div>

  <aside id="controls">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-top-bar">
      <span class="drawer-title">参数配置</span>
      <button id="closeDrawerBtn" type="button" class="drawer-close-btn" aria-label="关闭面板">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <header>
      <div class="brand-title-wrap">
        <svg class="brand-logo-icon" width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="字帖图标">
          <rect x="2" y="2" width="28" height="28" rx="7.5" class="brand-icon-bg" />
          <!-- 白底田字格纸张卡片与十字虚线 -->
          <rect x="5.5" y="5.5" width="21" height="21" rx="2.5" class="brand-tian-bg" />
          <rect x="5.5" y="5.5" width="21" height="21" rx="2.5" class="brand-tian-border" stroke-width="1.2" fill="none"/>
          <line x1="5.5" y1="16" x2="26.5" y2="16" class="brand-grid-line" stroke-dasharray="2.5 2" stroke-width="1"/>
          <line x1="16" y1="5.5" x2="16" y2="26.5" class="brand-grid-line" stroke-dasharray="2.5 2" stroke-width="1"/>
          <!-- 经典红铅笔（整体向右上平移，笔尖位于 11.5, 20.5） -->
          <path d="M 17.5 10.5 L 25.5 2.5 C 26.3 1.7 27.7 1.7 28.5 2.5 C 29.3 3.3 29.3 4.7 28.5 5.5 L 21.5 14.5 Z" fill="#ef4444" class="brand-pencil-body"/>
          <path d="M 17.5 10.5 L 25.5 2.5 L 27 4 L 19.5 12.5 Z" fill="#f87171" class="brand-pencil-highlight"/>
          <path d="M 13.5 16.5 L 17.5 10.5 C 18.5 12.5 20.5 13.5 21.5 14.5 L 15.5 18.5 Z" fill="#fed7aa" class="brand-pencil-wood"/>
          <path d="M 11.5 20.5 L 13.5 16.5 L 15.5 18.5 Z" fill="#1f2937" class="brand-pencil-lead"/>
          <circle cx="10.5" cy="21.5" r="1" fill="#374151" class="brand-ink-dot"/>
        </svg>
        <h1>字帖</h1>
      </div>
      <p class="hint">配置参数 · 实时预览 · 打印</p>
    </header>

    <div id="swipeGuideHint" class="swipe-guide-banner" hidden aria-hidden="true">
      <div class="swipe-hand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/>
          <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v6"/>
          <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
          <path d="M18 8a2 2 0 0 1 2 2v4a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
        </svg>
      </div>
      <span>左右滑动区域可快速切换 Tab 标签页</span>
      <button type="button" class="swipe-guide-close" id="closeSwipeGuideBtn" aria-label="关闭提示">✕</button>
    </div>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="content" role="tab">内容</button>
      <button class="tab" data-tab="grid" role="tab">格子</button>
      <button class="tab" data-tab="page" role="tab">页面</button>
    </nav>

    <div class="tab-body" data-panel="content" role="tabpanel">
      <section class="panel">
        <label class="field">
          <span>要练习的字</span>
          <textarea id="text" rows="4" placeholder="一行一字，或连续输入；可用 (pīnyīn) 标注拼音"></textarea>
        </label>
        <label class="field">
          <span>字体</span>
          <select id="fontFamily">
            <optgroup label="楷书">
              <option value="LXGW WenKai">霞鹜文楷</option>
              <option value="STKaiti, KaiTi">华文楷体</option>
              <option value="KaiTi" selected>楷体（系统）</option>
              <option value="KaiTi_GB2312, KaiTi">楷体_GB2312</option>
            </optgroup>
            <optgroup label="宋体 / 仿宋">
              <option value="SimSun, Songti">宋体</option>
              <option value="NSimSun, SimSun">新宋体</option>
              <option value="STSong, SimSun">华文宋体</option>
              <option value="FangSong, STFangsong">仿宋</option>
              <option value="STFangsong, FangSong">华文仿宋</option>
            </optgroup>
            <optgroup label="行书 / 草书">
              <option value="STXingkai, KaiTi">华文行楷</option>
              <option value="Xingkai SC, STXingkai">行楷 SC</option>
              <option value="STCaoshu, KaiTi">华文草书</option>
            </optgroup>
            <optgroup label="隶书 / 魏碑">
              <option value="STLiti, LiSu">华文隶书</option>
              <option value="LiSu, STLiti">隶书</option>
              <option value="STXinwei, SimSun">华文新魏</option>
            </optgroup>
            <optgroup label="黑体">
              <option value="Microsoft YaHei">微软雅黑</option>
              <option value="SimHei, Microsoft YaHei">黑体</option>
              <option value="PingFang SC, Microsoft YaHei">苹方</option>
              <option value="STHeiti, SimHei">华文黑体</option>
            </optgroup>
            <optgroup label="其他">
              <option value="STCaiyun, SimSun">华文彩云</option>
              <option value="FZYaoTi, SimSun">方正姚体</option>
              <option value="YouYuan, FangSong">幼圆</option>
            </optgroup>
          </select>
        </label>
        <label class="field">
          <span class="label-with-help">
            字帖模式
            <span class="help-tip" tabindex="0" role="button" aria-label="字帖模式说明">
              <span class="help-tip-icon" aria-hidden="true">?</span>
              <span class="help-tip-pop" role="tooltip">
                笔顺拆分：按正确笔顺一笔一笔拆开练（完整字 → 第1笔 → 前2笔… → 空格自己写）。此模式下范字和逐笔都用统一的标准笔顺字，不跟上面的「字体」走，这样更清晰、不会重影。描红、临摹、混合、空白等其它模式，仍使用上面选的字体。
              </span>
            </span>
          </span>
          <select id="charMode">
            <option value="stroke" selected>笔顺拆分</option>
            <option value="outline">描红</option>
            <option value="ghost">临摹</option>
            <option value="mix">混合</option>
            <option value="none">空白</option>
          </select>
        </label>
        <label class="field">
          <span id="repeatLabel">练习格数</span>
          <input id="repeat" type="number" min="1" max="20" value="1" />
        </label>
        <div class="field own-row-field">
          <span>单字独立成行</span>
          <label class="switch-field">
            <input type="checkbox" id="ownRow" checked />
            <span id="ownRowLabel">开启</span>
          </label>
        </div>
        <div id="strokeOptions" class="stroke-options" hidden>
          <p class="stroke-status" id="strokeStatus" hidden></p>
        </div>
      </section>
    </div>

    <div class="tab-body" data-panel="grid" role="tabpanel" hidden>
      <section class="panel">
        <label class="field">
          <span>格子类型</span>
          <select id="gridType">
            <option value="tian" selected>田字格</option>
            <option value="mi">米字格</option>
            <option value="jiu">九宫格</option>
            <option value="hui">回宫格</option>
            <option value="blank">空白方格</option>
            <option value="pinyin">拼音田字格</option>
            <option value="fourline">四线三格</option>
          </select>
        </label>
        <label class="field">
          <span>辅助线型</span>
          <select id="lineStyle">
            <option value="dashed" selected>虚线</option>
            <option value="solid">实线</option>
            <option value="dotted">点线</option>
          </select>
        </label>
        <label class="field">
          <span>线宽 pt</span>
          <input id="lineWidth" type="number" min="0.1" max="3" step="0.1" value="0.6" />
        </label>
        <label class="field">
          <span>格子尺寸 mm</span>
          <input id="cellSize" type="number" min="8" max="60" step="0.5" value="14" />
        </label>
        <label class="field">
          <span>辅助线颜色</span>
          <input id="lineColor" type="color" value="#e0e0e0" />
        </label>
        <label class="field">
          <span>边框颜色</span>
          <input id="borderColor" type="color" value="#999999" />
        </label>
      </section>
    </div>

    <div class="tab-body" data-panel="page" role="tabpanel" hidden>
      <section class="panel">
        <label class="field">
          <span>纸张类型</span>
          <select id="paper">
            <option value="A4" selected>A4（210×297 mm）</option>
            <option value="A5">A5（148×210 mm）</option>
            <option value="B5">B5（176×250 mm）</option>
            <option value="Letter">Letter（8.5×11 in）</option>
          </select>
        </label>
        <label class="field">
          <span>方向</span>
          <select id="orientation">
            <option value="portrait" selected>纵向</option>
            <option value="landscape">横向</option>
          </select>
        </label>
        <div class="field">
          <span>页边距 mm</span>
          <div class="grid-4">
            <label class="field">
              <span>上</span>
              <input id="marginTop" type="number" min="0" max="50" value="15" />
            </label>
            <label class="field">
              <span>下</span>
              <input id="marginBottom" type="number" min="0" max="50" value="15" />
            </label>
            <label class="field">
              <span>左</span>
              <input id="marginLeft" type="number" min="0" max="50" value="15" />
            </label>
            <label class="field">
              <span>右</span>
              <input id="marginRight" type="number" min="0" max="50" value="15" />
            </label>
          </div>
        </div>
        <label class="field">
          <span class="label-with-help">
            每行字数
            <span class="help-tip" tabindex="0" role="button" aria-label="每行字数说明">
              <span class="help-tip-icon" aria-hidden="true">?</span>
              <span class="help-tip-pop" role="tooltip">
                控制一行里放几个字。填 0 表示按格子大小自动算；填具体数字（如 8）则固定每行 8 个字。
              </span>
            </span>
          </span>
          <input id="perRow" type="number" min="0" max="20" value="0" />
        </label>

        <div class="section-title">表头</div>
        <label class="switch-field">
          <input type="checkbox" id="sheetHeader" />
          <span>显示表头</span>
        </label>
        <div class="header-options">
          <label class="field">
            <span>标题</span>
            <input id="headerTitle" type="text" value="字帖" />
          </label>
          <label class="field">
            <span>副标题</span>
            <input id="headerSubtitle" type="text" value="" />
          </label>
          <label class="field">
            <span>表头高度 mm</span>
            <input id="headerHeight" type="number" min="20" max="60" step="1" value="32" />
          </label>
          <label class="switch-field">
            <input type="checkbox" id="showMeta" />
            <span>姓名 / 班级 / 日期</span>
          </label>
        </div>

        <div class="section-title">页眉页脚</div>
        <label class="switch-field">
          <input type="checkbox" id="showPageHeader" />
          <span>显示页眉</span>
        </label>
        <label class="switch-field">
          <input type="checkbox" id="showPageFooter" />
          <span>显示页脚</span>
        </label>
        <div class="page-header-options">
          <p class="micro">页眉</p>
          <label class="field">
            <span>页眉高度 mm</span>
            <input id="pageHeaderHeight" type="number" min="6" max="30" step="0.5" value="10" />
          </label>
          <div class="grid-3">
            <label class="field">
              <span>左</span>
              <input id="headerLeft" type="text" placeholder="左侧文字" />
            </label>
            <label class="field">
              <span>中</span>
              <input id="headerCenter" type="text" placeholder="中间文字" />
            </label>
            <label class="field">
              <span>右</span>
              <input id="headerRight" type="text" placeholder="右侧文字" />
            </label>
          </div>
        </div>
        <div class="page-footer-options">
          <p class="micro">页脚</p>
          <label class="field">
            <span>页脚高度 mm</span>
            <input id="pageFooterHeight" type="number" min="6" max="30" step="0.5" value="10" />
          </label>
          <div class="grid-3">
            <label class="field">
              <span>左</span>
              <input id="footerLeft" type="text" placeholder="左侧文字" />
            </label>
            <label class="field">
              <span>中</span>
              <input id="footerCenter" type="text" placeholder="中间文字" />
            </label>
            <label class="field">
              <span>右</span>
              <input id="footerRight" type="text" placeholder="右侧文字" />
            </label>
          </div>
          <div class="grid-2">
            <label class="field">
              <span class="label-with-help">
                页码格式
                <span class="help-tip" tabindex="0" role="button" aria-label="页码格式说明">
                  <span class="help-tip-icon" aria-hidden="true">?</span>
                  <span class="help-tip-pop" role="tooltip">
                    选择页码怎么显示，例如「1」「1 / N」「第 X 页」。开启页码后，会盖住「页码位置」那一侧原来的页脚文字。
                  </span>
                </span>
              </span>
              <select id="pageNumberFmt">
                <option value="none" selected>无</option>
                <option value="num">1</option>
                <option value="numOfTotal">1 / N</option>
                <option value="cn">第 X 页</option>
                <option value="dash">- X -</option>
                <option value="p">P. X</option>
              </select>
            </label>
            <label class="field">
              <span>页码位置</span>
              <select id="pageNumberPos">
                <option value="br" selected>右下</option>
                <option value="bc">中下</option>
                <option value="bl">左下</option>
              </select>
            </label>
          </div>
        </div>
      </section>
    </div>

    <section class="panel actions">
      <div class="action-btns">
        <button id="printBtn" class="primary desktop-only-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
          <span>打印</span>
        </button>
        <button id="renderBtn" class="secondary desktop-only-btn">

            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          <span>重新渲染</span>

        <button id="mobilePreviewBtn" type="button" class="primary mobile-only-btn">

        <button id="resetBtn" class="secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
          </svg>
          <span>重置</span>
        </button>
        <button id="mobileCloseBtn" type="button" class="secondary mobile-only-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>

          <span>关闭</span>
        </button>
      </div>
      <div class="theme-switch" role="group" aria-label="主题">
        <button type="button" data-theme-set="light" title="浅色" aria-label="浅色">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
        <button type="button" data-theme-set="dark" title="深色" aria-label="深色">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/>
          </svg>
        </button>
        <button type="button" data-theme-set="auto" title="跟随系统" aria-label="跟随系统" class="active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="13" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
        </button>
      </div>
