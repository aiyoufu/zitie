<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-theme-pref="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>字帖生成器</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
</head>
<body>
  <aside id="controls">
    <header>
      <div class="brand">
        <h1>字帖生成器</h1>
        <div class="theme-switch" role="group" aria-label="主题">
          <button data-theme-set="light" title="浅色" aria-label="浅色">☀</button>
          <button data-theme-set="dark" title="深色" aria-label="深色">☾</button>
          <button data-theme-set="auto" title="跟随系统" aria-label="跟随系统" class="active">◐</button>
        </div>
      </div>
      <p class="hint">配置参数 · 实时预览 · 打印 / 另存 PDF</p>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="content" role="tab">内容</button>
      <button class="tab" data-tab="grid" role="tab">格子</button>
      <button class="tab" data-tab="page" role="tab">页面</button>
    </nav>

    <div class="tab-body" data-panel="content" role="tabpanel">
      <section class="panel">
        <label class="field">
          <span>要练习的字</span>
          <textarea id="text" rows="4" placeholder="一行一字，或连续输入；可用 (pīnyīn) 标注拼音"></textarea>
        </label>
        <div class="grid-2">
          <label class="field">
            <span>每字重复</span>
            <input id="repeat" type="number" min="1" max="20" placeholder="1" />
          </label>
          <label class="field">
            <span>字符模式</span>
            <select id="charMode">
              <option value="none" selected>空写</option>
              <option value="outline">描红</option>
              <option value="ghost">临摹</option>
              <option value="mix">混合</option>
            </select>
          </label>
        </div>
        <label class="field">
          <span>字体</span>
          <select id="fontFamily">
            <optgroup label="楷书">
              <option value="LXGW WenKai">霞鹜文楷</option>
              <option value="STKaiti, KaiTi">华文楷体</option>
              <option value="KaiTi" selected>楷体（系统）</option>
              <option value="KaiTi_GB2312, KaiTi">楷体_GB2312</option>
            </optgroup>
            <optgroup label="宋体 / 仿宋">
              <option value="SimSun, Songti">宋体</option>
              <option value="NSimSun, SimSun">新宋体</option>
              <option value="STSong, SimSun">华文宋体</option>
              <option value="FangSong, STFangsong">仿宋</option>
              <option value="STFangsong, FangSong">华文仿宋</option>
            </optgroup>
            <optgroup label="行书 / 草书">
              <option value="STXingkai, KaiTi">华文行楷</option>
              <option value="Xingkai SC, STXingkai">行楷 SC</option>
              <option value="STCaoshu, KaiTi">华文草书</option>
            </optgroup>
            <optgroup label="隶书 / 魏碑">
              <option value="STLiti, LiSu">华文隶书</option>
              <option value="LiSu, STLiti">隶书</option>
              <option value="STXinwei, SimSun">华文新魏</option>
            </optgroup>
            <optgroup label="黑体">
              <option value="Microsoft YaHei">微软雅黑</option>
              <option value="SimHei, Microsoft YaHei">黑体</option>
              <option value="PingFang SC, Microsoft YaHei">苹方</option>
              <option value="STHeiti, SimHei">华文黑体</option>
            </optgroup>
            <optgroup label="其他">
              <option value="STCaiyun, SimSun">华文彩云</option>
              <option value="FZYaoTi, SimSun">方正姚体</option>
              <option value="YouYuan, FangSong">幼圆</option>
            </optgroup>
          </select>
        </label>
      </section>
    </div>

    <div class="tab-body" data-panel="grid" role="tabpanel" hidden>
      <section class="panel">
        <label class="field">
          <span>格子类型</span>
          <select id="gridType">
            <option value="tian" selected>田字格</option>
            <option value="mi">米字格</option>
            <option value="jiu">九宫格</option>
            <option value="hui">回宫格</option>
            <option value="blank">空白方格</option>
            <option value="pinyin">拼音田字格</option>
            <option value="fourline">四线三格</option>
          </select>
        </label>
        <label class="field">
          <span>辅助线型</span>
          <select id="lineStyle">
            <option value="dashed" selected>虚线</option>
            <option value="solid">实线</option>
            <option value="dotted">点线</option>
          </select>
        </label>
        <div class="grid-2">
          <label class="field">
            <span>线宽 pt</span>
            <input id="lineWidth" type="number" min="0.1" max="3" step="0.1" value="0.6" />
          </label>
          <label class="field">
            <span>格子尺寸 mm</span>
            <input id="cellSize" type="number" min="8" max="60" step="0.5" value="14" />
          </label>
        </div>
        <div class="grid-2">
          <label class="field">
            <span>辅助线</span>
            <input id="lineColor" type="color" value="#cccccc" />
          </label>
          <label class="field">
            <span>边框</span>
            <input id="borderColor" type="color" value="#888888" />
          </label>
        </div>
      </section>
    </div>

    <div class="tab-body" data-panel="page" role="tabpanel" hidden>
      <section class="panel">
        <div class="grid-2">
          <label class="field">
            <span>纸张</span>
            <select id="paper">
              <option value="A4" selected>A4 (210×297)</option>
              <option value="A5">A5 (148×210)</option>
              <option value="B5">B5 (176×250)</option>
              <option value="Letter">Letter (8.5×11in)</option>
            </select>
          </label>
          <label class="field">
            <span>方向</span>
            <select id="orientation">
              <option value="portrait" selected>纵向</option>
              <option value="landscape">横向</option>
            </select>
          </label>
        </div>
        <div class="grid-4">
          <label class="field">
            <span>上</span>
            <input id="marginTop" type="number" min="0" max="50" value="15" />
          </label>
          <label class="field">
            <span>下</span>
            <input id="marginBottom" type="number" min="0" max="50" value="15" />
          </label>
          <label class="field">
            <span>左</span>
            <input id="marginLeft" type="number" min="0" max="50" value="15" />
          </label>
          <label class="field">
            <span>右</span>
            <input id="marginRight" type="number" min="0" max="50" value="15" />
          </label>
        </div>
        <label class="field">
          <span>每行字数（0=按尺寸自动）</span>
          <input id="perRow" type="number" min="0" max="20" value="0" />
        </label>

        <div class="section-title">表头</div>
        <label class="switch-field">
          <input type="checkbox" id="sheetHeader" />
          <span>显示表头</span>
        </label>
        <div class="header-options">
          <label class="field">
            <span>标题</span>
            <input id="headerTitle" type="text" value="田字格字帖生成器" />
          </label>
          <label class="field">
            <span>副标题</span>
            <input id="headerSubtitle" type="text" value="" />
          </label>
          <label class="field">
            <span>表头高度 mm</span>
            <input id="headerHeight" type="number" min="20" max="60" step="1" value="32" />
          </label>
          <label class="switch-field">
            <input type="checkbox" id="showMeta" />
            <span>姓名 / 班级 / 日期</span>
          </label>
        </div>

        <div class="section-title">页眉页脚</div>
        <label class="switch-field">
          <input type="checkbox" id="showPageHeader" />
          <span>显示页眉</span>
        </label>
        <div class="page-header-options">
          <p class="micro">页眉</p>
          <div class="grid-3">
            <input id="headerLeft" type="text" placeholder="左" />
            <input id="headerCenter" type="text" placeholder="中" />
            <input id="headerRight" type="text" placeholder="右" />
          </div>
        </div>

        <label class="switch-field">
          <input type="checkbox" id="showPageFooter" />
          <span>显示页脚</span>
        </label>
        <div class="page-footer-options">
          <p class="micro">页脚</p>
          <div class="grid-3">
            <input id="footerLeft" type="text" placeholder="左" />
            <input id="footerCenter" type="text" placeholder="中" />
            <input id="footerRight" type="text" placeholder="右" />
          </div>
          <div class="grid-2">
            <label class="field">
              <span>页码格式</span>
              <select id="pageNumberFmt">
                <option value="none" selected>无</option>
                <option value="num">1</option>
                <option value="numOfTotal">1 / N</option>
                <option value="cn">第 X 页</option>
                <option value="dash">- X -</option>
                <option value="p">P. X</option>
              </select>
            </label>
            <label class="field">
              <span>页码位置</span>
              <select id="pageNumberPos">
                <option value="br" selected>右下</option>
                <option value="bc">中下</option>
                <option value="bl">左下</option>
              </select>
            </label>
          </div>
        </div>

        <label class="field">
          <span>页眉页脚高度 mm</span>
          <input id="hfHeight" type="number" min="6" max="30" step="0.5" value="10" />
        </label>
        <p class="micro">提示：页码会覆盖所选位置的页脚文字</p>
      </section>
    </div>

    <section class="panel actions">
      <button id="renderBtn" class="primary">重新渲染</button>
      <button id="printBtn" class="primary">打印 / 保存 PDF</button>
      <button id="resetBtn">重置</button>
    </section>

    <footer>
      <p class="hint">提示：打印时在浏览器对话框选择「另存为 PDF」即可导出。横向纸张请在对话框勾选方向。</p>
    </footer>
  </aside>

  <main id="preview">
    <div id="preview-stage">
      <div id="pages"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
